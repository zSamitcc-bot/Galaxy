<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CustomRP Hub</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="background"></div>

<header>
    <h1>CustomRP Hub</h1>
    <p>Launcher • Discord • Estado • Descargas</p>
</header>

<div class="container">

    <div class="card">
        <h2>Launcher</h2>
        <p>Descarga el launcher oficial.</p>
        <button>Abrir</button>
    </div>

    <div class="card">
        <h2>Discord</h2>
        <p>Únete a la comunidad.</p>
        <button>Entrar</button>
    </div>

    <div class="card">
        <h2>Estado</h2>
        <p>Servidor online.</p>
        <button>Ver</button>
    </div>

    <div class="card">
        <h2>Cliente</h2>
        <p>CustomRP Client.</p>
        <button>Descargar</button>
    </div>

</div>

<footer>
    © 2026 CustomRP
</footer>

</body>
</html>
